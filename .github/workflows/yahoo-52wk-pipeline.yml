name: Yahoo 52W Gainers Pipeline

on:
  schedule:
    - cron: '0 0 * * *'
      timezone: 'America/Santiago'
  workflow_dispatch:

jobs:
  update-yahoo-52wk:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
      SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
      SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
      SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
      SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libxml2-dev \
            libssl-dev \
            libpq-dev

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(
            c(
              "DBI",
              "RPostgres",
              "dplyr",
              "purrr",
              "rvest",
              "xml2",
              "readr",
              "stringr",
              "tibble",
              "lubridate",
              "jsonlite",
              "zoo"
            ),
            repos = "https://cloud.r-project.org"
          )

      - name: Run scraper
        run: Rscript scrape_yahoo_52week_gainers.R

      - name: Run strategy
        run: Rscript update_yahoo_52wk_trades.Rmd
